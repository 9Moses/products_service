apiVersion: apps/v1
kind: Deployment
metadata:
	name: main-backend
	namespace: rest-microservice
spec:
	replicas: 1
	selector:
		matchLabels:
			app: main-backend
	template:
		metadata:
			labels:
				app: main-backend
		spec:
			containers:
				- name: main-backend
					image: rest-microservice-main:latest
					command: ["python","main.py"]
					ports:
						- containerPort: 5000
					env:
						- name: MYSQL_HOST
							value: "main-db"
						- name: MYSQL_PORT
							value: "3306"
						- name: MYSQL_DATABASE
							value: "main"
						- name: MYSQL_ROOT_PASSWORD
							value: "root"

---
apiVersion: v1
kind: Service
metadata:
	name: main-backend
	namespace: rest-microservice
spec:
	type: NodePort
	selector:
		app: main-backend
	ports:
		- port: 5000
			targetPort: 5000
			nodePort: 30081

---
apiVersion: apps/v1
kind: Deployment
metadata:
	name: main-queue
	namespace: rest-microservice
spec:
	replicas: 1
	selector:
		matchLabels:
			app: main-queue
	template:
		metadata:
			labels:
				app: main-queue
		spec:
			containers:
				- name: main-queue
					image: rest-microservice-main:latest
					command: ["python","consumer.py"]
					env:
						- name: MYSQL_HOST
							value: "main-db"
						- name: MYSQL_PORT
							value: "3306"
						- name: MYSQL_DATABASE
							value: "main"
						- name: MYSQL_ROOT_PASSWORD
							value: "root"

---
apiVersion: apps/v1
kind: Deployment
metadata:
	name: main-db
	namespace: rest-microservice
spec:
	replicas: 1
	selector:
		matchLabels:
			app: main-db
	template:
		metadata:
			labels:
				app: main-db
		spec:
			containers:
				- name: mysql
					image: mysql:8.0
					env:
						- name: MYSQL_DATABASE
							value: "main"
						- name: MYSQL_ROOT_PASSWORD
							value: "root"
					ports:
						- containerPort: 3306
					volumeMounts:
						- name: mysql-storage
							mountPath: /var/lib/mysql
			volumes:
				- name: mysql-storage
					persistentVolumeClaim:
						claimName: main-db-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
	name: main-db-pvc
	namespace: rest-microservice
spec:
	accessModes:
		- ReadWriteOnce
	resources:
		requests:
			storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
	name: main-db
	namespace: rest-microservice
spec:
	selector:
		app: main-db
	ports:
		- protocol: TCP
			port: 3306
			targetPort: 3306

