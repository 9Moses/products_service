- name: Provision local microservice stack
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    api_path: "{{ playbook_dir }}/../api"
    main_path: "{{ playbook_dir }}/../main"
    api_env_path: "{{ api_path }}/.env"
    main_env_path: "{{ main_path }}/.env"
  tasks:
    - name: Ensure API environment file exists
      copy:
        dest: "{{ api_env_path }}"
        content: |
          RABBITMQ_URL=amqp://guest:guest@localhost:5672/
        force: no

    - name: Ensure Main environment file exists
      copy:
        dest: "{{ main_env_path }}"
        content: |
          RABBITMQ_URL=amqp://guest:guest@localhost:5672/
        force: no

    - name: Build API Docker image
      community.docker.docker_image:
        source: build
        build:
          path: "{{ api_path }}"
          dockerfile: Dockerfile
        name: rest-api
        tag: latest

    - name: Build Main Docker image
      community.docker.docker_image:
        source: build
        build:
          path: "{{ main_path }}"
          dockerfile: Dockerfile
        name: rest-main
        tag: latest

    - name: Start RabbitMQ container
      community.docker.docker_container:
        name: rest-rabbitmq
        image: rabbitmq:3.11-management
        state: started
        restart_policy: always
        published_ports:
          - "5672:5672"
          - "15672:15672"
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest

    - name: Start API MySQL container
      community.docker.docker_container:
        name: rest-api-db
        image: mysql:8.0
        state: started
        restart_policy: always
        published_ports:
          - "33066:3306"
        env:
          MYSQL_DATABASE: admin
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ALLOW_EMPTY_PASSWORD: "no"
        command: --default-authentication-plugin=mysql_native_password
        volumes:
          - "{{ playbook_dir }}/../api_dbdata:/var/lib/mysql"

    - name: Start Main MySQL container
      community.docker.docker_container:
        name: rest-main-db
        image: mysql:8.0
        state: started
        restart_policy: always
        published_ports:
          - "33067:3306"
        env:
          MYSQL_DATABASE: main
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ALLOW_EMPTY_PASSWORD: "no"
        command: --default-authentication-plugin=mysql_native_password
        volumes:
          - "{{ playbook_dir }}/../main_dbdata:/var/lib/mysql"

    - name: Start API service container
      community.docker.docker_container:
        name: rest-api
        image: rest-api:latest
        state: started
        restart_policy: on-failure
        published_ports:
          - "8000:8000"
        env:
          RABBITMQ_URL: amqp://guest:guest@rest-rabbitmq:5672/
        command: python manage.py runserver 0.0.0.0:8000
        volumes:
          - "{{ api_path }}:/app"

    - name: Start API consumer container
      community.docker.docker_container:
        name: rest-api-consumer
        image: rest-api:latest
        state: started
        restart_policy: on-failure
        env:
          RABBITMQ_URL: amqp://guest:guest@rest-rabbitmq:5672/
        command: python consumer.py
        volumes:
          - "{{ api_path }}:/app"

    - name: Start Main service container
      community.docker.docker_container:
        name: rest-main
        image: rest-main:latest
        state: started
        restart_policy: on-failure
        published_ports:
          - "8001:5000"
        env:
          RABBITMQ_URL: amqp://guest:guest@rest-rabbitmq:5672/
        command: python main.py
        volumes:
          - "{{ main_path }}:/app"

    - name: Start Main consumer container
      community.docker.docker_container:
        name: rest-main-consumer
        image: rest-main:latest
        state: started
        restart_policy: on-failure
        env:
          RABBITMQ_URL: amqp://guest:guest@rest-rabbitmq:5672/
        command: python consumer.py
        volumes:
          - "{{ main_path }}:/app"
